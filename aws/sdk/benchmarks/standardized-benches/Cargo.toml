[package]
name = "standardized-benches"
authors = ["AWS Rust SDK Team <aws-sdk-rust@amazon.com>"]
description = "Benchmark suites to create rough comparison of the performance of different parts of the SDKs"
version = "0.1.0"
edition = "2021"

[lib]
name = "standardized_benches"
path = "src/lib.rs"

[dependencies]
aws-sdk-lambda = { path = "../../build/aws-sdk/sdk/lambda" }
aws-sdk-s3 = { path = "../../build/aws-sdk/sdk/s3" }
aws-smithy-types = { path = "../../build/aws-sdk/sdk/aws-smithy-types" }
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt", "rt-multi-thread", "macros"] }
