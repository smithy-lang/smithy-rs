# This workflow runs the shared CI (`ci.yml`) in the two targeted scenarios that used to be covered
# by the (now removed) dry-run release workflows:
#
#   1. On demand (`workflow_dispatch`): run full CI against an arbitrary branch, tag, or commit
#      without having to open a pull request. Useful for validating CI or codegen changes on a
#      feature branch (this replaces running a dry-run release with "skip CI" unchecked).
#   2. On a daily schedule: run CI against `main` to catch regressions that are NOT triggered by a
#      push to smithy-rs. The most important of these is `check-semver-hazards`, which depends on
#      the external `awslabs/aws-sdk-rust` repository and can start failing as that repository
#      drifts, even when smithy-rs `main` itself has not changed.

name: Scheduled and manual CI
run-name: ${{ github.workflow }} (${{ inputs.git_ref || 'main' }})
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: |
          The branch, tag, or commit SHA to run CI against.
          Use the non-abbreviated commit SHA if you want to target a specific commit.
        required: true
        type: string
      run_canary:
        description: Whether to run the canary against the generated SDKs.
        required: false
        default: true
        type: boolean
  schedule:
    # Runs at 00:00 UTC every day to check the health of `main`.
  - cron: 0 0 * * *

# Allow only one run per git ref at a time.
concurrency:
  group: ci-scheduled-and-manual-${{ inputs.git_ref || 'main' }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  id-token: write
  pull-requests: read

jobs:
  # Build and upload the Docker build image if necessary, mirroring `ci-main.yml`, so that the
  # shared CI jobs can pull it from ECR.
  acquire-base-image:
    name: Acquire Base Image
    # Never run the scheduled execution on forks (they lack the required secrets); still allow
    # maintainers to trigger a manual run.
    if: github.event_name == 'workflow_dispatch' || github.repository == 'smithy-lang/smithy-rs'
    runs-on: smithy_ubuntu-latest_8-core
    timeout-minutes: 60
    outputs:
      docker-login-password: ${{ steps.set-token.outputs.docker-login-password }}
    permissions:
      id-token: write
      contents: read
    steps:
    - uses: GitHubSecurityLab/actions-permissions/monitor@v1
    - name: Checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ inputs.git_ref || 'main' }}
    - uses: ./.github/actions/free-disk-space
    - name: Acquire credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.SMITHY_RS_ECR_PUSH_ROLE_ARN }}
        role-session-name: GitHubActions
        aws-region: us-west-2
    - name: Save the docker login password to the output
      id: set-token
      run: |
        ENCRYPTED_PAYLOAD=$(
          gpg --symmetric --batch --passphrase "${{ secrets.DOCKER_LOGIN_TOKEN_PASSPHRASE }}" --output - <(aws ecr get-login-password --region us-west-2) | base64 -w0
        )
        echo "docker-login-password=$ENCRYPTED_PAYLOAD" >> $GITHUB_OUTPUT
    - name: Acquire base image
      id: acquire
      env:
        DOCKER_BUILDKIT: 1
        ENCRYPTED_DOCKER_PASSWORD: ${{ steps.set-token.outputs.docker-login-password }}
        DOCKER_LOGIN_TOKEN_PASSPHRASE: ${{ secrets.DOCKER_LOGIN_TOKEN_PASSPHRASE }}
      run: ./.github/scripts/acquire-build-image
    - name: Tag and upload image
      run: |
        IMAGE_TAG="ci-$(./.github/scripts/docker-image-hash)"
        ./.github/scripts/upload-build-image.sh $IMAGE_TAG

  # Run the shared CI after a Docker build image has been uploaded to ECR.
  ci:
    needs: acquire-base-image
    uses: ./.github/workflows/ci.yml
    with:
      git_ref: ${{ inputs.git_ref || 'main' }}
      # Always run the canary on the daily scheduled health check; let the operator decide for
      # manual runs (defaults to true).
      run_canary: ${{ github.event_name == 'schedule' || inputs.run_canary }}
    secrets:
      ENCRYPTED_DOCKER_PASSWORD: ${{ needs.acquire-base-image.outputs.docker-login-password }}
      DOCKER_LOGIN_TOKEN_PASSPHRASE: ${{ secrets.DOCKER_LOGIN_TOKEN_PASSPHRASE }}
      CANARY_GITHUB_ACTIONS_ROLE_ARN: ${{ secrets.CANARY_GITHUB_ACTIONS_ROLE_ARN }}
      CANARY_STACK_CDK_OUTPUTS_BUCKET_NAME: ${{ secrets.CANARY_STACK_CDK_OUTPUTS_BUCKET_NAME }}
