[package]
name = "aws-smithy-json"
version = "0.62.6"
authors = ["AWS Rust SDK Team <aws-sdk-rust@amazon.com>", "John DiSanti <jdisanti@amazon.com>"]
description = "Token streaming JSON parser for smithy-rs."
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/smithy-lang/smithy-rs"
rust-version = "1.91.1"

[dependencies]
aws-smithy-runtime-api = { path = "../aws-smithy-runtime-api", features = ["client", "http-02x"] }
aws-smithy-schema = { path = "../aws-smithy-schema" }
aws-smithy-types = { path = "../aws-smithy-types" }

[dev-dependencies]
proptest = "1"
# Pinned due to https://github.com/serde-rs/json/issues/1309
serde_json = "=1.0.146"

[package.metadata.docs.rs]
all-features = true
targets = ["x86_64-unknown-linux-gnu"]
cargo-args = ["-Zunstable-options", "-Zrustdoc-scrape-examples"]
rustdoc-args = ["--cfg", "docsrs"]
# End of docs.rs metadata
